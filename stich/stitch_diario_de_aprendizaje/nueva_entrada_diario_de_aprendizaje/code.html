<!DOCTYPE html>
<html class="text-[10px]" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Grimorio de Sabiduría - Nueva Entrada</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&amp;family=Pinyon+Script&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "grimoire-leather": "#1a120b",
                      "parchment-base": "#f4e4bc",
                      "parchment-shadow": "#dcc69c",
                      "ink": "#2c241d",
                      "wax-red": "#8b0000",
                      "wax-red-light": "#b22222",
                      "wax-red-dark": "#5a0000"
              },
              "fontFamily": {
                      "headline": ["Newsreader", "serif"],
                      "body": ["Newsreader", "serif"],
                      "script": ["Pinyon Script", "cursive"]
              }
            }
          }
        }
    </script>
<style type="text/tailwindcss">
        @layer utilities {
            .parchment-texture {
                background-color: #f4e4bc;
                background-image: 
                    url("https://www.transparenttextures.com/patterns/parchment.png"),
                    radial-gradient(circle at center, rgba(255,255,255,0.2) 0%, rgba(0,0,0,0.05) 100%);
            }
            .deckle-edge-left {
                clip-path: polygon(0% 0%, 100% 0%, 100% 100%, 0% 100%, 2% 98%, 0% 95%, 2% 92%, 0% 88%, 1% 85%, 0% 80%, 2% 75%, 0% 70%, 1% 65%, 0% 60%, 2% 55%, 0% 50%, 1% 45%, 0% 40%, 2% 35%, 0% 30%, 1% 25%, 0% 20%, 2% 15%, 0% 10%, 1% 5%);
            }
            .deckle-edge-right {
                clip-path: polygon(0% 0%, 98% 2%, 100% 5%, 98% 8%, 100% 12%, 99% 15%, 100% 20%, 98% 25%, 100% 30%, 99% 35%, 100% 40%, 98% 45%, 100% 50%, 99% 55%, 100% 60%, 98% 65%, 100% 70%, 99% 75%, 100% 80%, 98% 85%, 100% 90%, 99% 95%, 100% 100%, 0% 100%);
            }
            .parchment-lines {
                background-image: repeating-linear-gradient(
                    transparent,
                    transparent 31px,
                    rgba(44, 36, 29, 0.1) 31px,
                    rgba(44, 36, 29, 0.1) 32px
                );
                background-size: 100% 32px;
                line-height: 32px;
            }
            .wax-seal-3d {
                background: radial-gradient(circle at 30% 30%, #b22222, #8b0000 60%, #5a0000);
                box-shadow: 
                    inset 2px 2px 5px rgba(255,255,255,0.3),
                    inset -2px -2px 5px rgba(0,0,0,0.5),
                    0 10px 15px rgba(0,0,0,0.4);
            }
            .wax-seal-inner {
                border: 2px solid rgba(0,0,0,0.1);
                box-shadow: inset 0 0 10px rgba(0,0,0,0.2);
            }
            .leather-bg {
                background-color: #1a120b;
                background-image: url("https://www.transparenttextures.com/patterns/leather.png");
            }
        }
    </style>
</head>
<body class="leather-bg min-h-screen flex items-center justify-center p-4 md:p-8 overflow-x-hidden selection:bg-wax-red/20">
<div class="relative w-full max-w-6xl aspect-[1.4/1] flex shadow-[0_50px_100px_rgba(0,0,0,0.8)] rounded-lg overflow-visible">
<div class="relative flex-1 parchment-texture deckle-edge-left border-r border-black/10 flex flex-col p-12 md:p-20 items-center justify-center text-center">
<div class="absolute top-4 left-4 w-32 h-32 opacity-30 grayscale contrast-125 pointer-events-none">
<span class="material-symbols-outlined text-8xl text-ink">eco</span>
</div>
<div class="absolute bottom-12 right-8 w-40 h-40 opacity-20 grayscale rotate-12 pointer-events-none">
<span class="material-symbols-outlined text-9xl text-ink">psychology_alt</span>
</div>
<div class="absolute top-1/2 -left-4 -translate-y-1/2 w-24 h-64 opacity-20 grayscale pointer-events-none">
<span class="material-symbols-outlined text-9xl text-ink">grass</span>
</div>
<header class="mb-12">
<div class="font-script text-4xl text-ink/70 mb-2">Libro de Crónicas</div>
<div class="w-24 h-px bg-ink/20 mx-auto"></div>
</header>
<div class="w-full space-y-10 relative z-10">
<div class="flex flex-col gap-2 group">
<label class="font-headline italic text-xl text-ink/60 uppercase tracking-widest text-xs">Título de la Entrada</label>
<input class="bg-transparent border-0 border-b border-ink/20 focus:border-ink/60 focus:ring-0 font-headline text-4xl text-ink placeholder:text-ink/20 transition-all text-center pb-2" placeholder="Escribe aquí..." type="text"/>
</div>
<div class="flex flex-col gap-2 group">
<label class="font-headline italic text-xl text-ink/60 uppercase tracking-widest text-xs">Categoría del Saber</label>
<input class="bg-transparent border-0 border-b border-ink/20 focus:border-ink/60 focus:ring-0 font-script text-3xl text-ink placeholder:text-ink/20 transition-all text-center" placeholder="Ej. Alquimia, Botánica..." type="text"/>
</div>
<div class="pt-12">
<div class="text-ink/40 font-headline italic text-sm tracking-widest uppercase">
                        Anno Domini MMXXIV
                    </div>
</div>
</div>
</div>
<div class="relative flex-1 parchment-texture deckle-edge-right flex flex-col p-12 md:p-16">
<div class="flex-grow">
<textarea class="w-full h-full bg-transparent border-0 focus:ring-0 p-0 font-body text-[1.8rem] text-ink/90 resize-none parchment-lines placeholder:text-ink/20 scrollbar-hide" placeholder="El conocimiento se desvanece si no se plasma en papel. Inicia tu relato aquí..."></textarea>
</div>
<div class="absolute bottom-8 left-8 opacity-20 pointer-events-none">
<span class="material-symbols-outlined text-6xl text-ink">history_edu</span>
</div>
</div>
<div class="absolute left-1/2 top-0 bottom-0 w-8 -translate-x-1/2 bg-gradient-to-r from-black/20 via-transparent to-black/20 pointer-events-none"></div>
<div class="absolute bottom-[-4rem] left-1/2 -translate-x-1/2 z-50">
<button class="group relative flex items-center justify-center" type="submit">
<div class="w-32 h-32 rounded-full wax-seal-3d flex items-center justify-center transition-transform duration-300 group-hover:scale-110 active:scale-95">
<div class="w-24 h-24 rounded-full wax-seal-inner flex flex-col items-center justify-center text-white border-dashed border-white/10">
<span class="material-symbols-outlined text-4xl mb-1" style="font-variation-settings: 'FILL' 1;">auto_stories</span>
<span class="font-headline font-bold text-sm uppercase tracking-tighter">Guardar</span>
</div>
<div class="absolute -top-1 -right-2 w-8 h-8 rounded-full bg-wax-red-dark blur-[1px]"></div>
<div class="absolute -bottom-2 -left-1 w-10 h-6 rounded-full bg-wax-red-dark blur-[1px]"></div>
</div>
<div class="absolute top-full mt-4 opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none">
<span class="bg-black/80 text-white text-[10px] px-3 py-1 rounded-full uppercase tracking-widest whitespace-nowrap">Estampar en el tiempo</span>
</div>
</button>
</div>
</div>
<div class="fixed top-10 right-10 opacity-40 pointer-events-none hidden lg:block">
<span class="material-symbols-outlined text-[10rem] text-parchment-base">ink_pen</span>
</div>
<div class="fixed bottom-10 left-10 opacity-30 pointer-events-none hidden lg:block">
<span class="material-symbols-outlined text-[8rem] text-parchment-base">candle</span>
</div>
<div class="fixed top-8 left-8 z-50">
<button class="flex items-center gap-2 text-parchment-base/50 hover:text-parchment-base transition-colors group">
<span class="material-symbols-outlined text-2xl transition-transform group-hover:-translate-x-1">arrow_left_alt</span>
<span class="font-headline italic text-lg">Cerrar Libro</span>
</button>
</div>

</body></html>
